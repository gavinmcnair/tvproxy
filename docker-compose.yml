version: "3.8"

services:
  tvproxy:
    build: .
    image: tvproxy:latest
    container_name: tvproxy
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - TVPROXY_BASE_URL=http://localhost
    volumes:
      - tvproxy-data:/data
      - tvproxy-recordings:/record
    # devices:
    #   # Intel GPU (Arc A380, iGPU) - VA-API / QSV
    #   - /dev/dri:/dev/dri
    # Uncomment below for NVIDIA GPU support (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, video]

volumes:
  tvproxy-data:
    external: true
  tvproxy-recordings:
