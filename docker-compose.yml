version: "3.8"

services:
  tvproxy:
    build: .
    image: tvproxy:latest
    container_name: tvproxy
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - tvproxy-data:/data
    devices:
      # Intel GPU (Arc A380, iGPU) - VA-API / QSV
      - /dev/dri:/dev/dri
    # Uncomment below for NVIDIA GPU support (requires nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu, video]

volumes:
  tvproxy-data:
